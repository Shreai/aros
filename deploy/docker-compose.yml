version: "3.9"

services:
  aros-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AROS_SECRET=${AROS_SECRET:-changeme-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - aros-data:/app/.aros-data
      - ./aros.config.json:/app/aros.config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  aros-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"   # localhost only (security audit 2026-07-15, M3)
    environment:
      - POSTGRES_DB=aros
      - POSTGRES_USER=aros
      - POSTGRES_PASSWORD=${DB_PASSWORD:-aros-dev-password}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aros"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  aros-redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"   # localhost only (security audit 2026-07-15, M3)
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  aros-data:
  pg-data:
  redis-data:
