# Cloudflare Tunnel Config — MULTI-DOMAIN (2026-04-16)
# ═══════════════════════════════════════════════════════════════════════════
# Supports 8 domains: shre.ai, aros.live, nirlab.net, agenticretailos.com,
# nirtek.net (legacy), + 3 redirect domains.
#
# Routing principle:
#   - Landing/marketing pages → VPS (DNS A records, not tunnel)
#   - Mac-dependent services (CortexDB, Ollama, agents) → tunnel
#   - Redirect domains → VPS nginx (301 redirects)
#
# To apply:
#   cp cloudflare-config-post-cutover.yml ~/.cloudflared/config.yml
#   launchctl unload ~/Library/LaunchAgents/ai.shre.cloudflare-tunnel.plist
#   launchctl load ~/Library/LaunchAgents/ai.shre.cloudflare-tunnel.plist
# ═══════════════════════════════════════════════════════════════════════════

tunnel: a789b275-63b4-49bd-bb7c-6697135b7b70
credentials-file: /Users/aibot/.cloudflared/a789b275-63b4-49bd-bb7c-6697135b7b70.json

ingress:
  # ══════════════════════════════════════════════════════════════════════
  # shre.ai — Mac-dependent services (CortexDB, Ollama, agents)
  # Landing page (shre.ai / www.shre.ai) → VPS via DNS A record
  # ══════════════════════════════════════════════════════════════════════

  # Platform app (MIB007 UI + API) — depends on full agent stack
  - hostname: app.shre.ai
    service: http://127.0.0.1:5431

  # Shre Chat — depends on CortexDB, Ollama, shre-router
  - hostname: chat.shre.ai
    service: http://127.0.0.1:5431

  # API gateway — shre-router, depends on all backend services
  - hostname: api.shre.ai
    service: http://127.0.0.1:5497

  # Developer docs — aros-developer-portal
  - hostname: docs.shre.ai
    service: http://127.0.0.1:5442

  # Status dashboard — shre-health
  - hostname: status.shre.ai
    service: http://127.0.0.1:5485

  # Voice — depends on local Ollama
  - hostname: voice.shre.ai
    service: http://127.0.0.1:5431

  # ══════════════════════════════════════════════════════════════════════
  # aros.live — Mac-dependent services
  # Landing page (aros.live / www.aros.live) → VPS via DNS A record
  # ══════════════════════════════════════════════════════════════════════

  # Customer dashboard — depends on CortexDB, agent stack
  - hostname: app.aros.live
    service: http://127.0.0.1:5431

  # ══════════════════════════════════════════════════════════════════════
  # nirlab.net — Investor portal on Mac (own auth)
  # Landing page (nirlab.net / www.nirlab.net) → VPS via DNS A record
  # ══════════════════════════════════════════════════════════════════════

  - hostname: investor.nirlab.net
    service: http://127.0.0.1:5414

  # ══════════════════════════════════════════════════════════════════════
  # nirtek.net legacy — Mac-dependent services (keep during migration)
  # ══════════════════════════════════════════════════════════════════════

  - hostname: shre.nirtek.net
    service: http://127.0.0.1:5431

  - hostname: chat.nirtek.net
    service: http://127.0.0.1:5431

  - hostname: mib007.nirtek.net
    service: http://127.0.0.1:5431

  - hostname: mib.nirtek.net
    service: http://127.0.0.1:5431

  - hostname: commandcenter.nirtek.net
    service: http://127.0.0.1:5431

  - hostname: shrecity.nirtek.net
    service: http://127.0.0.1:5431

  - hostname: voice.nirtek.net
    service: http://127.0.0.1:5431

  # Legacy investor portal — keep until nirlab.net migration complete
  - hostname: investor.nirtek.net
    service: http://127.0.0.1:5414

  - hostname: investors.nirtek.net
    service: http://127.0.0.1:5414

  # ── Disabled routes ────────────────────────────────────────────────
  - hostname: app.nirtek.net
    service: http_status:410

  - hostname: blocks.nirtek.net
    service: http_status:403

  - hostname: blocks.nirlab.io
    service: http_status:403

  # ── Private routes (Tailscale machine-to-machine) ──────────────────
  - hostname: shadow-ollama.nirtek.net
    service: http://100.86.194.36:11434
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s

  - hostname: shadow-ssh.nirtek.net
    service: ssh://100.86.194.36:22

  # ── Catch-all (required by cloudflared) ────────────────────────────
  - service: http_status:404

# ═══════════════════════════════════════════════════════════════════════════
# ROUTE DISTRIBUTION (8 domains):
#
# VPS (DNS A record → 187.124.85.107, nginx TLS termination):
#   shre.ai, www.shre.ai             — platform landing page
#   aros.live, www.aros.live          — product landing page
#   nirlab.net, www.nirlab.net        — corporate landing page
#   agenticretailos.com, www          — SEO concept page
#   arosapp.com, arosapp.online       — 301 → aros.live
#   agenticretailos.online             — 301 → agenticretailos.com
#   nirtek.net, www.nirtek.net         — legacy AROS SPA
#   (spillquest.com now lives on its own dedicated VPS — not in this zone routing)
#
# Mac tunnel (above — depends on CortexDB/Ollama/agents):
#   app.shre.ai      — MIB007 platform UI
#   chat.shre.ai     — Shre Chat
#   api.shre.ai      — shre-router gateway
#   docs.shre.ai     — developer docs (aros-developer-portal:5442)
#   status.shre.ai   — health dashboard
#   voice.shre.ai    — voice platform
#   app.aros.live    — customer dashboard
#   investor.nirlab.net — investor portal
#   *.nirtek.net legacy (shre/chat/mib007/mib/commandcenter/shrecity/voice)
#
# Private (Tailscale): shadow-ollama/ssh.nirtek.net
# ═══════════════════════════════════════════════════════════════════════════
