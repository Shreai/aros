# AROS Platform — Nginx Reverse Proxy
# /etc/nginx/sites-available/aros

# Rate limiting zone: 30 req/s per IP
limit_req_zone $binary_remote_addr zone=aros_limit:10m rate=30r/s;

# Upstream
upstream aros_backend {
    server 127.0.0.1:5457;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name aros.live www.aros.live beta.aros.live *.aros.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aros.nirtek.net *.aros.nirtek.net;

    # SSL — Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/aros.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aros.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml
        font/woff2;

    # Rate limiting
    limit_req zone=aros_limit burst=60 nodelay;
    limit_req_status 429;

    # SPA root
    root /opt/aros-platform/apps/web/dist;

    # Static assets — serve directly with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        expires 7d;
        access_log off;
    }

    # Static root files (logo, manifest, etc.)
    location = /logo.svg {
        expires 7d;
        access_log off;
    }

    # Verifone download page — static files
    location /verifone/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # API routes → Node backend
    location /api/ {
        proxy_pass http://aros_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health/readiness → Node backend
    location = /health {
        proxy_pass http://aros_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /readyz {
        proxy_pass http://aros_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Trace endpoints → Node backend
    location /v1/ {
        proxy_pass http://aros_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other routes serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Request size limit
    client_max_body_size 10m;

    access_log /var/log/nginx/aros-access.log;
    error_log /var/log/nginx/aros-error.log;
}
