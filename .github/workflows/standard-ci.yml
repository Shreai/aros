name: Standard CI

on:
  pull_request:
  push:
    branches: [main, master, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        if: ${{ hashFiles('requirements.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node deps
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm install -g pnpm || true
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile; else npm ci || npm install; fi

      - name: Install Python deps
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest || true

      - name: Validate Claims JSON
        run: |
          if [ -f .claims/claims.json ]; then
            jq . .claims/claims.json >/dev/null
          fi

      - name: Verify Managed Rules
        run: |
          chmod +x scripts/verify-managed-rules.sh || true
          if [ -f scripts/verify-managed-rules.sh ]; then
            ./scripts/verify-managed-rules.sh
          fi

      - name: Run tests
        run: |
          chmod +x scripts/test.sh || true
          if [ -f scripts/test.sh ]; then ./scripts/test.sh; else echo "No scripts/test.sh"; fi
