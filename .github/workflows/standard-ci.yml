name: Standard CI

on:
  pull_request:
  push:
    branches: [main, master, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        if: ${{ hashFiles('requirements.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node deps
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          # CI runners do not include ../shre-sdk, but package.json references
          # it as a local file dependency. Create a minimal stub for validation.
          if [ ! -d ../shre-sdk ]; then
            mkdir -p ../shre-sdk
            cat > ../shre-sdk/package.json <<'JSON'
          {
            "name": "shre-sdk",
            "version": "0.0.0-ci-stub",
            "main": "index.js"
          }
          JSON
            echo "module.exports = {};" > ../shre-sdk/index.js
          fi

          npm install -g pnpm || true
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile; else npm ci || npm install; fi

      - name: Install Python deps
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest || true

      - name: Validate Claims JSON
        run: |
          if [ -f .claims/claims.json ]; then
            jq . .claims/claims.json >/dev/null
          fi

      - name: Run tests
        run: |
          chmod +x scripts/test.sh || true
          if [ -f scripts/test.sh ]; then ./scripts/test.sh; else echo "No scripts/test.sh"; fi
